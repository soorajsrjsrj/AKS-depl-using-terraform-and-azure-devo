trigger:
- main

pool:
  vmImage: ubuntu-latest   # change to 'Default' if using self-hosted

variables:
  azureServiceConnection: 'myconnection2'

stages:

# ✅ STAGE 1: INIT
- stage: INIT
  displayName: Terraform Init (PROD)

  jobs:
  - job: InitJob
    steps:
    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: AzureCLI@2
      displayName: Terraform Init
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd env/prod
          terraform init


# ✅ STAGE 2: PLAN
- stage: PLAN
  displayName: Terraform Plan (PROD)
  dependsOn: INIT
  condition: succeeded()

  jobs:
  - job: PlanJob
    steps:
    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: AzureCLI@2
      displayName: Terraform Plan
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd env/prod

          echo "===== INIT (required again) ====="
          terraform init

          echo "===== PLAN ====="
          terraform plan -var-file="prod.tfvars" -no-color


# ✅ STAGE 3: APPLY
- stage: APPLY
  displayName: Terraform Apply (PROD)
  dependsOn: PLAN
  condition: succeeded()

  jobs:
  - job: ApplyJob
    steps:
    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: AzureCLI@2
      displayName: Terraform Apply
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd env/prod

          echo "===== INIT (required again) ====="
          terraform init

          echo "===== APPLY ====="
          terraform apply -auto-approve -var-file="prod.tfvars"

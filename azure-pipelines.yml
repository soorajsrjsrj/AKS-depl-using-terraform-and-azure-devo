# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml
trigger:
- main

pool:
  vmImage: ubuntu-latest   # ✅ keep this (or change to self-hosted later)

variables:
  azureServiceConnection: 'my-azure-connection'

stages:

# ✅ Stage 1: INIT
- stage: INIT
  displayName: Terraform Init (PROD)
  jobs:
  - job: InitJob
    steps:
    - checkout: self

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: 'env/prod'
        backendServiceArm: '$(azureServiceConnection)'
        backendType: 'selfConfigured'   # ✅ REQUIRED FIX

# ✅ Stage 2: PLAN
- stage: PLAN
  displayName: Terraform Plan (PROD)
  dependsOn: INIT
  condition: succeeded()

  jobs:
  - job: PlanJob
    steps:
    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTaskV4@4
      displayName: Terraform Plan
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: 'env/prod'
        environmentServiceNameAzureRM: '$(azureServiceConnection)'

# ✅ Stage 3: APPLY
- stage: APPLY
  displayName: Terraform Apply (PROD)
  dependsOn: PLAN
  condition: succeeded()

  jobs:
  - job: ApplyJob
    steps:
    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTaskV4@4
      displayName: Terraform Apply
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: 'env/prod'
        environmentServiceNameAzureRM: '$(azureServiceConnection)'